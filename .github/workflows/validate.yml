name: validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  GIT_CONFIG_NOSYSTEM: "1"
  GIT_TERMINAL_PROMPT: "0"
  GIT_PAGER: "cat"
  PAGER: "cat"
  PYTHONDONTWRITEBYTECODE: "1"

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint workflows
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Run actionlint
        shell: bash
        run: |
          set -euo pipefail
          ACTIONLINT_VERSION="1.7.12"
          ACTIONLINT_SHA256="8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
          curl --fail --retry 3 -sSL \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            -o actionlint.tar.gz
          echo "${ACTIONLINT_SHA256}  actionlint.tar.gz" | sha256sum -c -
          tar xzf actionlint.tar.gz
          ./actionlint -color

  test:
    name: ${{ matrix.os }} Python ${{ matrix.python_version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python_version:
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python_version }}

      - name: Record tool versions
        shell: bash
        run: |
          set -euo pipefail
          python --version
          git --version

      - name: Validate skill packages
        run: python scripts/validate_skills.py

      - name: Run Git semantic tests (full)
        if: runner.os == 'Linux'
        run: python scripts/smoke_test_git.py

      - name: Run Git semantic tests (macOS subset)
        if: runner.os == 'macOS'
        run: python scripts/smoke_test_git.py --platform macos

      - name: Run Git semantic tests (Windows subset)
        if: runner.os == 'Windows'
        run: python scripts/smoke_test_git.py --platform windows

      - name: Run security regression tests
        run: python scripts/security_regression.py

      - name: Verify reproducible release
        run: python scripts/build_release.py --check

  packaging:
    name: Reproducible package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - test

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"

      - name: Record tool versions
        shell: bash
        run: |
          set -euo pipefail
          python --version
          git --version

      - name: Verify reproducible release
        run: python scripts/build_release.py --check

      - name: Verify clean source tree
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          test -z "$(git status --porcelain=v1 --untracked-files=all)"

  client-compatibility:
    name: Pinned client compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - packaging

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          check-latest: true
          package-manager-cache: false

      - name: Record Node.js and client versions
        shell: bash
        run: |
          set -euo pipefail
          node --version
          npm --version
          echo "Skills CLI: 1.5.17"
          echo "Claude Code: 2.1.209"

      - name: Validate grouped Skills CLI discovery
        shell: bash
        run: |
          set -euo pipefail

          EXPECTED_SKILLS="$(
            node -e '
              const catalog = require("./skills/catalog.json");
              console.log(catalog.skills.length);
            '
          )"

          CI=1 npx --yes skills@1.5.17 add . --list | tee /tmp/skills-list.txt
          grep -Eq "Found.*${EXPECTED_SKILLS}.*skills" /tmp/skills-list.txt
          grep -Fq "Git Agent Skills" /tmp/skills-list.txt

      - name: Validate Claude Code plugin manifest
        run: >-
          npx --yes @anthropic-ai/claude-code@2.1.209
          plugin validate . --strict

      - name: Verify clean source tree
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          test -z "$(git status --porcelain=v1 --untracked-files=all)"

  client-forward-probe:
    name: Node 26 latest-client probe
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - client-compatibility
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "26"
          check-latest: true
          package-manager-cache: false

      - name: Record Node.js and client versions
        shell: bash
        run: |
          set -euo pipefail
          node --version
          npm --version
          echo "Skills CLI: latest"
          echo "Claude Code: latest"

      - name: Validate grouped Skills CLI discovery
        shell: bash
        run: |
          set -euo pipefail

          EXPECTED_SKILLS="$(
            node -e '
              const catalog = require("./skills/catalog.json");
              console.log(catalog.skills.length);
            '
          )"

          CI=1 npx --yes skills@latest add . --list |
            tee /tmp/skills-list.txt

          grep -Eq "Found.*${EXPECTED_SKILLS}.*skills" /tmp/skills-list.txt
          grep -Fq "Git Agent Skills" /tmp/skills-list.txt

      - name: Validate Claude Code plugin manifest
        run: >-
          npx --yes
          @anthropic-ai/claude-code@latest
          plugin validate . --strict

      - name: Verify clean source tree
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          test -z "$(git status --porcelain=v1 --untracked-files=all)"
