version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Asia/Bangkok
    open-pull-requests-limit: 5
    rebase-strategy: auto
    commit-message:
      prefix: "chore(deps)"
    groups:
      actions-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch